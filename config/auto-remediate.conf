# Auto-remediation whitelist for safe Lynis findings.
# Only low-risk findings with well-understood, non-disruptive fixes are listed.
#
# Format: LYNIS_TEST_ID | risk_level | remediation_type | description

KRNL-6000  | low | sysctl    | Enable process accounting
FILE-6310  | low | permission | Tighten /etc/crontab permissions
FILE-6344  | low | permission | Tighten /etc/at.deny or /etc/at.allow
SHLL-6220  | low | config    | Set TMOUT for idle shell sessions
BANN-7126  | low | file      | Add legal banner to /etc/issue.net
BANN-7130  | low | file      | Add legal banner to /etc/issue
NAME-4404  | low | sysctl    | Disable core dumps for SUID binaries
HRDN-7222  | low | compiler  | Check compiler permissions
NETW-2705  | low | sysctl    | Check for uncommon network protocols
PKGS-7392  | low | config    | Enable apt-listbugs or similar
FINT-4350  | low | package   | File integrity tool not installed (AIDE)
